<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Khmer Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_page.css') }}">

    <style>
        body {
            font-family: 'Noto Sans Khmer', sans-serif;
            overflow-x: hidden;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 1030;
        }

        .sidebar.collapsed {
            left: -250px;
        }

        /* ================= MAIN ================= */
        .main-content {
            margin-left: 250px;
            transition: all 0.3s ease;
        }

        .main-content.full {
            margin-left: 0;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            z-index: 1020;
            transition: all 0.3s ease;
        }

        .topbar.full {
            left: 0;
        }

        /* ================= CONTENT ================= */
        #page-content {
            margin-top: 80px;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 991px) {
            .sidebar {
                left: -250px;
            }

            .sidebar.show {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .topbar {
                left: 0;
            }
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 1010;
        }

        .overlay.show {
            display: block;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">

<div class="overlay" id="overlay"></div>

<div class="d-flex">

    <!-- ================= SIDEBAR ================= -->
    <nav id="sidebar" class="sidebar bg-success text-white p-4 shadow-sm">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo_rice.png') }}"
                 class="img-fluid mb-2" style="max-width:120px; border-radius:100px;">
            <h6 class="fw-bold mb-0">Rice Expert</h6>
            <small class="text-light">ប្រព័ន្ធវិនិច្ឆ័យជំងឺស្រូវ</small>
        </div>

        <ul class="nav flex-column gap-2">

            <li class="nav-item">
                <a class="nav-link text-white" href="{{ url_for('admin.dashboard') }}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>

            <li class="nav-item mt-3 text-uppercase small text-light">Management</li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{{ url_for('tbl_users.index') }}">
                    <i class="bi bi-people me-2"></i> Users
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{{ url_for('tbl_roles.index') }}">
                    <i class="bi bi-shield-lock me-2"></i> Roles
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{{ url_for('tbl_diseases.index') }}">
                    <i class="bi bi-bug me-2"></i> Diseases
                </a>
            </li>

            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="{{ url_for('auth.logout') }}">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </a>
            </li>

        </ul>
    </nav>

    <!-- ================= MAIN ================= -->
    <div id="mainContent" class="main-content flex-grow-1">

        <!-- ================= TOPBAR ================= -->
        <nav id="topbar" class="topbar bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">

            <!-- LEFT -->
            <div class="d-flex align-items-center gap-3">
                <button id="toggleBtn" class="btn btn-outline-secondary">
                    <i class="bi bi-list"></i>
                </button>

                <div>
                    <h5 class="fw-bold mb-0">{% block page_title %}Dashboard{% endblock %}</h5>
                    <small id="greeting-text" class="text-muted"></small>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="d-flex align-items-center gap-3">

                <div class="text-end small">
                    <div id="khmer-date" class="fw-semibold"></div>
                    <div id="current-time" class="text-muted"></div>
                </div>

                <button id="darkModeToggle" class="btn btn-outline-secondary">
                    <i class="bi bi-moon-stars"></i>
                </button>

                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-person-circle"></i>
                    <span>{{ current_user.username }}</span>
                </div>

            </div>

        </nav>

        <!-- ================= CONTENT ================= -->
        <main id="page-content" class="p-4">

            {% block content %}{% endblock %}

        </main>

    </div>
</div>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");
const overlay = document.getElementById("overlay");
const main = document.getElementById("mainContent");
const topbar = document.getElementById("topbar");

toggleBtn.onclick = () => {
    if (window.innerWidth < 992) {
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
    } else {
        sidebar.classList.toggle("collapsed");
        main.classList.toggle("full");
        topbar.classList.toggle("full");
    }
};

overlay.onclick = () => {
    sidebar.classList.remove("show");
    overlay.classList.remove("show");
};

/* TIME */
function updateTime(){
    const d = new Date();
    document.getElementById("current-time").innerText = d.toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

/* GREETING */
const hour = new Date().getHours();
document.getElementById("greeting-text").innerText =
    hour < 12 ? "🌅 Good Morning" :
    hour < 17 ? "☀️ Good Afternoon" :
    "🌙 Good Evening";

/* DARK MODE */
const body = document.body;
const toggle = document.getElementById("darkModeToggle");

if (localStorage.getItem("dark") === "on") {
    body.classList.add("dark-mode");
}

toggle.onclick = () => {
    body.classList.toggle("dark-mode");
    localStorage.setItem("dark", body.classList.contains("dark-mode") ? "on" : "off");
};
</script>

</body>
</html>
